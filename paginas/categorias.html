<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - Adega RSBG</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>🍺Adega RSBG</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="bebidas.html">Bebidas</a></li>
                    <li><a href="categorias.html" class="active">Categorias</a></li>
                    <li><a href="fornecedores.html">Fornecedores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2>Lista de Categorias</h2>
            <a href="catCad.html" class="btn btn-success">+ Nova Categoria</a>
        </div>

        <div class="filter-bar">
            <input type="text" id="filtro" placeholder="Filtrar por nome ou descrição..." oninput="filtrar()">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Temperatura</th>
                        <th>Ações</th>
                        <th>Excluir</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </main>

    <div id="modalEditar" class="modal-overlay" onclick="if (event.target === this) fecharModal()">
        <div class="modal-box">
            <h3>Editar Categoria</h3>
            <form onsubmit="salvarEdicao(); return false;">
                <div class="form-group">
                    <label for="edit-nome">Nome da Categoria</label>
                    <input type="text" id="edit-nome" required>
                </div>

                <div class="form-group">
                    <label for="edit-descricao">Descrição</label>
                    <input type="text" id="edit-descricao" required>
                </div>

                <div class="form-group">
                    <label for="edit-temperatura">Temperatura de Serviço</label>
                    <input type="text" id="edit-temperatura" required>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/categorias.js"></script>
    <script>listar()</script>

    <footer>
        <div class="container">
        </div>
    </footer>
</body>

</html>
