<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Bebida - Adega RSBG</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>🍺 Adega RSBG</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="bebidas.html">Bebidas</a></li>
                    <li><a href="categorias.html">Categorias</a></li>
                    <li><a href="fornecedores.html">Fornecedores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <a href="bebidas.html" class="back-link">← Voltar para lista</a>

        <div class="form-container">
            <h2>Cadastrar Nova Bebida</h2>

            <form onsubmit="adicionar(); return false;">
                <div class="form-group">
                    <label for="nome">Nome da Bebida *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria *</label>
                    <input type="text" id="categoria" name="categoria" required>
                </div>

                <div class="form-group">
                    <label for="volume">Volume *</label>
                    <input type="text" id="volume" name="volume" placeholder="Ex: 350ml" required>
                </div>

                <div class="form-group">
                    <label for="preco">Preço (R$) *</label>
                    <input type="number" id="preco" name="preco" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="imagem">Link da Imagem</label>
                    <input type="url" id="imagem" name="imagem" placeholder="https://...">
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <a href="bebidas.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
        </div>
    </footer>

    <script src="../js/bebidas.js"></script>
</body>

</html>
