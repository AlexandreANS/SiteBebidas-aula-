<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebidas - Adega RSBG</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>🍺 Adega RSBG</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="bebidas.html" class="active">Bebidas</a></li>
                    <li><a href="categorias.html">Categorias</a></li>
                    <li><a href="fornecedores.html">Fornecedores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2>Lista de Bebidas</h2>
            <a href="bebCad.html" class="btn btn-success">+ Nova Bebida</a>
        </div>

        <div class="filter-bar">
            <input type="text" id="filtro" placeholder="Filtrar por nome ou categoria..." oninput="filtrar()">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagem</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Volume</th>
                        <th>Preço</th>
                        <th>Ações</th>
                        <th>Excluir</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>
        </div>
    </main>

    <div id="modalEditar" class="modal-overlay" onclick="if (event.target === this) fecharModal()">
        <div class="modal-box">
            <h3>Editar Bebida</h3>
            <form onsubmit="salvarEdicao(); return false;">
                <div class="form-group">
                    <label for="edit-nome">Nome da Bebida</label>
                    <input type="text" id="edit-nome" required>
                </div>

                <div class="form-group">
                    <label for="edit-categoria">Categoria</label>
                    <input type="text" id="edit-categoria" required>
                </div>

                <div class="form-group">
                    <label for="edit-volume">Volume</label>
                    <input type="text" id="edit-volume" required>
                </div>

                <div class="form-group">
                    <label for="edit-preco">Preço (R$)</label>
                    <input type="number" id="edit-preco" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="edit-imagem">Link da Imagem</label>
                    <input type="url" id="edit-imagem" placeholder="https://...">
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/bebidas.js"></script>
    <script>listar()</script>

    <footer>
        <div class="container">
        </div>
    </footer>
</body>

</html>
