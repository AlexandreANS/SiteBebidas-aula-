<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Fornecedor - Adega RSBG</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header>
        <div class="container">
            <h1>🍺 Adega RSBG</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="bebidas.html">Bebidas</a></li>
                    <li><a href="categorias.html">Categorias</a></li>
                    <li><a href="fornecedores.html">Fornecedores</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <a href="fornecedores.html" class="back-link">← Voltar para lista</a>

        <div class="form-container">
            <h2>Cadastrar Novo Fornecedor</h2>

            <form onsubmit="adicionar(); return false;">
                <div class="form-group">
                    <label for="nome">Nome do Fornecedor *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="cidade">Cidade *</label>
                    <input type="text" id="cidade" name="cidade" required>
                </div>

                <div class="form-group">
                    <label for="contato">Contato *</label>
                    <input type="text" id="contato" name="contato" placeholder="Ex: (51) 99999-0000" required>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-success">Cadastrar</button>
                    <a href="fornecedores.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
        </div>
    </footer>

    <script src="../js/fornecedores.js"></script>
</body>

</html>
